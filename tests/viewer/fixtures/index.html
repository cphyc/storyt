<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>storyt viewer</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 16px; background: #fafafa; }
    .breadcrumb { margin-bottom: 16px; font-size: 14px; }
    .breadcrumb span.label { cursor: pointer; color: #0066cc; }
    .breadcrumb span.label:hover { text-decoration: underline; }
    .breadcrumb span.sep { color: #999; margin: 0 4px; }
    .card { border: 1px solid #ddd; padding: 10px 14px; margin: 6px 0; border-radius: 4px; background: white; }
    .card-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-link { color: #0066cc; cursor: pointer; text-decoration: underline; font-weight: bold; }
    .key-display { font-family: monospace; font-size: 13px; font-weight: bold; }
    .sibling-section { margin-top: 8px; padding: 6px 10px; background: #f5f5f5; border-radius: 3px; font-size: 13px; }
    .sibling-name { font-weight: bold; }
    button { cursor: pointer; padding: 3px 10px; font-size: 12px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 5px 10px; text-align: left; }
    th { background: #f0f0f0; }
    .loading { color: #888; font-style: italic; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
'use strict';

// Module-level fetch cache: keyed by URL, value is a Promise<Array>
const fetchCache = new Map();

async function cachedFetch(url) {
  if (!fetchCache.has(url)) {
    fetchCache.set(
      url,
      fetch(url).then(r => r.ok ? r.json() : []).catch(() => [])
    );
  }
  return fetchCache.get(url);
}

// ─── DataTable ────────────────────────────────────────────────────────────────
const DataTable = {
  props: ['rows'],
  template: `
    <table>
      <thead><tr><th>Sibling</th><th>Property</th><th>Value</th></tr></thead>
      <tbody>
        <tr v-for="(row, i) in rows" :key="i">
          <td>{{ row.sibling }}</td>
          <td>{{ row.property }}</td>
          <td>{{ row.value }}</td>
        </tr>
      </tbody>
    </table>
  `
};

// ─── InstanceCard ─────────────────────────────────────────────────────────────
const InstanceCard = {
  props: {
    instance:       { type: Object,  required: true },
    childrenTypes:  { type: Array,   default: () => [] },
    parentUrlPath:  { type: String,  default: null },
  },
  components: { DataTable },
  emits: ['navigate'],
  data() {
    return {
      expanded:     false,
      propertyRows: null,   // null = not yet loaded; [] = loaded but empty
      loadingProps: false,
    };
  },
  computed: {
    keyString() {
      return Object.entries(this.instance.keys || {})
        .map(([k, v]) => `${k}=${v}`)
        .join(', ');
    },
    displayLabel() {
      return this.keyString || this.instance.url_path || String(this.instance.id);
    },
    canNavigate() {
      return !!(this.instance.url_path && this.childrenTypes && this.childrenTypes.length > 0);
    },
    siblings() {
      return this.instance.siblings || {};
    },
  },
  methods: {
    async toggleExpand() {
      this.expanded = !this.expanded;
      if (this.expanded && this.propertyRows === null) {
        await this.fetchProperties();
      }
    },
    async fetchProperties() {
      this.loadingProps = true;
      const rows = [];

      // Own properties (stored alongside parent listing)
      for (const prop of (this.instance.properties || [])) {
        const base = this.parentUrlPath ? `data/${this.parentUrlPath}` : 'data';
        const data = await cachedFetch(`${base}/${prop}.json`);
        const entry = (data || []).find(e => e.id === this.instance.id);
        rows.push({
          sibling:  '(self)',
          property: prop,
          value:    entry !== undefined ? entry.value : 'N/A',
        });
      }

      // Sibling properties (stored under sibling's own url_path)
      for (const [sibName, sib] of Object.entries(this.siblings)) {
        for (const prop of (sib.properties || [])) {
          const base = sib.url_path ? `data/${sib.url_path}` : 'data';
          const data = await cachedFetch(`${base}/${prop}.json`);
          const entry = (data || []).find(e => e.id === sib.id);
          rows.push({
            sibling:  sibName,
            property: prop,
            value:    entry !== undefined ? entry.value : 'N/A',
          });
        }
      }

      this.propertyRows = rows;
      this.loadingProps = false;
    },
    navigate() {
      this.$emit('navigate', this.instance);
    },
    siblingKeyStr(sib) {
      return Object.entries(sib.keys || {}).map(([k, v]) => `${k}=${v}`).join(', ');
    },
  },
  template: `
    <div class="card">
      <div class="card-header">
        <span v-if="canNavigate" class="nav-link" @click="navigate">{{ displayLabel }}</span>
        <span v-else class="key-display">{{ displayLabel }}</span>
        <button data-testid="expand-btn" @click="toggleExpand">
          {{ expanded ? '▲ Collapse' : '▼ Expand' }}
        </button>
      </div>
      <div v-if="Object.keys(siblings).length">
        <div v-for="(sib, sibName) in siblings" :key="sibName" class="sibling-section">
          <span class="sibling-name">{{ sibName }}</span>
          <span v-if="siblingKeyStr(sib)">: {{ siblingKeyStr(sib) }}</span>
        </div>
      </div>
      <div v-if="expanded">
        <span v-if="loadingProps" class="loading">Loading properties…</span>
        <template v-else>
          <data-table v-if="propertyRows && propertyRows.length" :rows="propertyRows" />
          <p v-else style="color:#888;font-size:13px;margin:4px 0;">No properties.</p>
        </template>
      </div>
    </div>
  `
};

// ─── AssetListView ────────────────────────────────────────────────────────────
const AssetListView = {
  props: {
    urlPath:  { type: String, default: null },
    treeNode: { type: Object, default: null },
  },
  components: { InstanceCard },
  emits: ['navigate'],
  data() {
    return {
      instances: [],
      loading:   false,
      fetchSeq:  0,
    };
  },
  computed: {
    childTypes() {
      return this.treeNode ? (this.treeNode.children || []) : [];
    },
  },
  async created() {
    await this.fetchInstances();
  },
  watch: {
    urlPath()  { this.fetchInstances(); },
    treeNode() { this.fetchInstances(); },
  },
  methods: {
    async fetchInstances() {
      const seq = ++this.fetchSeq;
      this.loading = true;
      const all = [];
      for (const childType of this.childTypes) {
        const url = this.urlPath
          ? `data/${this.urlPath}/${childType.name}.json`
          : `data/${childType.name}.json`;
        const data = await cachedFetch(url);
        if (seq !== this.fetchSeq) return;
        for (const inst of (data || [])) {
          all.push({ ...inst, _childType: childType });
        }
      }
      if (seq !== this.fetchSeq) return;
      this.instances = all;
      this.loading = false;
    },
    onCardNavigate(instance) {
      this.$emit('navigate', { instance, treeNode: instance._childType });
    },
  },
  template: `
    <div>
      <span v-if="loading" class="loading">Loading…</span>
      <instance-card
        v-for="inst in instances"
        :key="inst.id"
        :instance="inst"
        :children-types="inst._childType ? inst._childType.children : []"
        :parent-url-path="urlPath"
        @navigate="onCardNavigate"
      />
    </div>
  `
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = {
  components: { AssetListView },
  data() {
    return {
      hierarchy: null,
      navStack:  [],
    };
  },
  computed: {
    currentFrame() {
      return this.navStack.length ? this.navStack[this.navStack.length - 1] : null;
    },
  },
  async created() {
    const data = await cachedFetch('data/hierarchy.json');
    if (data && data.tree) {
      this.hierarchy = data;
      this.navStack = [{ label: 'Home', urlPath: null, treeNode: data.tree }];
    }
  },
  methods: {
    onNavigate({ instance, treeNode }) {
      const label = instance.url_path
        ? instance.url_path.split('/').pop()
        : `id=${instance.id}`;
      this.navStack.push({ label, urlPath: instance.url_path, treeNode });
    },
    navigateTo(index) {
      this.navStack = this.navStack.slice(0, index + 1);
    },
  },
  template: `
    <nav data-testid="breadcrumb" class="breadcrumb">
      <template v-for="(frame, i) in navStack" :key="i">
        <span class="label" @click="navigateTo(i)">{{ frame.label }}</span>
        <span class="sep" v-if="i < navStack.length - 1"> / </span>
      </template>
    </nav>
    <asset-list-view
      v-if="hierarchy && currentFrame"
      :url-path="currentFrame.urlPath"
      :tree-node="currentFrame.treeNode"
      @navigate="onNavigate"
    />
  `
};

Vue.createApp(App).mount('#app');
</script>
</body>
</html>
